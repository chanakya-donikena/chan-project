<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Auth App</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <a href="index.html" class="logo">Chan Project</a>
      <div class="nav-actions" id="nav-actions">
        <!-- Populated by auth.js -->
      </div>
    </nav>

    <main class="welcome-section">
      <span class="badge">Welcome to Chan Project</span>
      <h1>Your <span>secure</span> starting point</h1>
      <p>
        A simple, clean authentication demo. Sign up to create an account or log
        in to access your profile. Built with plain HTML, JavaScript, and a
        Node.js + MySQL backend.
      </p>
      <div class="cta-group" id="cta-group">
        <!-- Populated by auth.js -->
      </div>
      <div class="welcome-user-info" id="welcome-user-info" style="display: none"></div>
    </main>

    <script src="js/auth.js"></script>
    <script>
      const navActions = document.getElementById('nav-actions');
      const ctaGroup = document.getElementById('cta-group');
      const welcomeUserInfo = document.getElementById('welcome-user-info');
      const user = getLoggedInUser();

      if (user) {
        navActions.innerHTML = `
          <span style="font-size:0.9rem;color:#6b7280;">Hi, <strong>${user.name}</strong></span>
          <button class="btn btn-outline" onclick="logout()">Logout</button>
        `;
        ctaGroup.innerHTML = `
          <button class="btn btn-primary" onclick="logout()">Logout</button>
        `;
        welcomeUserInfo.style.display = 'block';
        welcomeUserInfo.innerHTML = `Logged in as <strong>${user.email}</strong>`;
      } else {
        navActions.innerHTML = `
          <a href="login.html" class="btn btn-outline">Login</a>
          <a href="signup.html" class="btn btn-primary">Sign Up</a>
        `;
        ctaGroup.innerHTML = `
          <a href="signup.html" class="btn btn-primary">Get Started</a>
          <a href="login.html" class="btn btn-outline">Login</a>
        `;
      }
    </script>
  </body>
</html>
